<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desaichk — Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Невидимые SVG фильтры для графики -->
  <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
    <!-- Фильтр для эффекта карандашной штриховки (дрожащие линии) -->
    <filter id="rough-edge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <!-- Лист блокнота -->
  <div class="notebook-page">
    <!-- Пружина / спираль -->
    <div class="spirals"></div>

    <!-- Точечная сетка -->
    <div class="dot-grid"></div>

    <!-- Тень переплёта -->
    <div class="binding-shadow"></div>

    <!-- Фактура бумаги (шум) -->
    <div class="paper-texture"></div>

    <!-- Скручивающийся хедер -->
    <header class="rolled-header">
      <div class="header-flat">
        <div class="logo-sketch">EK</div>
        <nav class="nav-sketch">
          <a href="#about" class="nav-item"><span class="checkbox">[ ]</span> обо мне</a>
          <a href="#projects" class="nav-item"><span class="checkbox">[ ]</span> проекты</a>
          <a href="#stack" class="nav-item"><span class="checkbox">[ ]</span> стек</a>
          <a href="#contact" class="nav-item"><span class="checkbox">[ ]</span> контакты</a>
        </nav>
      </div>
      <!-- Цилиндр скрутки -->
      <div class="header-roll" id="paperRoll"></div>
    </header>

    <!-- Контент -->
    <main class="page-content">
      <div class="hero-section">

        <!-- Левая часть: Заголовок -->
        <div class="hero-left">
          <h1 class="hero-title">
            <span style="display: inline-block;" data-scribble="true" data-scribble-type="underline" data-scribble-color="rgba(30, 30, 30, 0.6)" data-scribble-stroke="3.5" data-scribble-passes="4" data-scribble-jitter="15" data-scribble-width="1.1">Desaichk</span>
          </h1>
          <p class="hero-subtitle">
            разработчик,<br>
            который придумывает,<br>
            ломает и пересобирает <br>
            <span class="marker-red">системы</span>
          </p>

          <!-- Указатель на правый блок -->
          <div class="hero-arrow">
            <svg width="180" height="120" viewBox="0 0 180 120" style="overflow: visible; mix-blend-mode: multiply; filter: url(#rough-edge);">
              <!-- Небрежная стрелка-маркер -->
              <path d="M10,20 Q80,100 160,50" fill="none" stroke="rgba(211, 47, 47, 0.6)" stroke-width="12" stroke-linecap="round" />
              <path d="M140,40 L165,48 L150,70" fill="none" stroke="rgba(211, 47, 47, 0.6)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="arrow-label">it's me</span>
          </div>
        </div>

        <div class="hero-center-doodles">
          <!-- Абстрактные штрихи и каракули через нашу систему -->
          <div class="doodle d-shading" data-scribble="true" data-scribble-type="fill" data-scribble-passes="1" data-scribble-step="25" data-scribble-jitter="30" data-scribble-color="rgba(30,30,30,0.15)"></div>
          <div class="doodle d-box" data-scribble="true" data-scribble-type="box" data-scribble-passes="2" data-scribble-jitter="15" data-scribble-color="rgba(30,30,30,0.2)"></div>
          <div class="doodle d-line" data-scribble="true" data-scribble-type="underline" data-scribble-passes="8" data-scribble-jitter="25" data-scribble-color="rgba(211,47,47,0.2)" data-scribble-width="1.5"></div>
          <div class="doodle d-star" data-scribble="true" data-scribble-type="underline" data-scribble-passes="3" data-scribble-jitter="10" data-scribble-color="rgba(30,30,30,0.3)" data-scribble-angle="45"></div>
          <div class="doodle d-star-alt" data-scribble="true" data-scribble-type="underline" data-scribble-passes="3" data-scribble-jitter="10" data-scribble-color="rgba(30,30,30,0.3)" data-scribble-angle="-45"></div>
        </div>

        <!-- Правая часть: Аватарка (рисунок карандашом) -->
        <div class="hero-right">
          <div class="avatar-block">
            <img src="images/ava.png" alt="Desaichk Avatar" class="pencil-avatar">
            
            <!-- Скотч по краям (как будто кусок со скетчем приклеен к листу) -->
            <div class="tape tape-top"></div>
            <div class="tape tape-bottom"></div>
          </div>
        </div>

      </div>

      <!-- Место для прокрутки -->
      <div style="height: 100vh;"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
